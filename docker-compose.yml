version: '3.8'

services:
  # MySQL数据库服务
  mysql:
    image: mysql:8.0
    container_name: ppe_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-ppe_smart_manager}
      MYSQL_USER: ${DB_USER:-ppe_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-ppe_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./data/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - ppe_network

  # 后端API服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ppe_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-ppe_user}
      DB_PASSWORD: ${DB_PASSWORD:-ppe_password}
      DB_NAME: ${DB_NAME:-ppe_smart_manager}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      XUNFEI_APP_ID: ${XUNFEI_APP_ID:-}
      XUNFEI_API_KEY: ${XUNFEI_API_KEY:-}
      XUNFEI_API_SECRET: ${XUNFEI_API_SECRET:-}
      CORS_ORIGIN: ${CORS_ORIGIN}
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ppe_network

  # Nginx反向代理（可选，用于生产环境）
  nginx:
    image: nginx:alpine
    container_name: ppe_nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - ppe_network
    profiles:
      - production

volumes:
  mysql_data:
    driver: local

networks:
  ppe_network:
    driver: bridge
